<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Job Tracker</title>
    <link rel="stylesheet" href="job.css">
</head>

<body>

    <!-- Header Section -->

    <header class="logo-header">
        <div class="logo">
            <h3 class="logo1">Job</h3>
            <h3 class="logo2">Tracker</h3>
        </div>

        <div class="signup-login">
            <button class="login"><a href="login.html">Login</a></button>
            <hr>
            <button class="sign-up"><a href="signup.html">Sign Up</a></button>
        </div>
    </header>

    <!-- Body Content Section -->

    <section class="body-content">
        <div class="content">
            <h1 class="page-title">Track Your Applications Like a Pro</h1>
            <hr class="hr-title">
            <p class="para">Organize and track all your developer job applications in one place. Stay updated and
                productive in your job search journey.</p>
            <button class="get-started">Get Started</button>
            <button class="learn-more">Learn More</button>
        </div>
    </section>

    <!-- Features Section -->

    <section class="features-list">
        <div class="features">
            <div class="feat1">
                <img src="square.png" alt="Feature Icon">
                <h2 class="feat">Track Applications</h2>
            </div>

            <div class="feat1">
                <img src="approval.png" alt="Feature Icon">
                <h2 class="feat">Manage Interviews</h2>
            </div>

            <div class="feat1">
                <img src="check.png" alt="Feature Icon">
                <h2 class="feat">Stay Organized</h2>
            </div>
        </div>
    </section>

    <!-- Footer Section -->

    <footer>
        <a href="#" class="footer-link">About</a>
        <hr>
        <a href="#" class="footer-link">Contact</a>
        <hr>
        <a href="#" class="footer-link">Privacy</a>
    </footer>
</body>

</html>
