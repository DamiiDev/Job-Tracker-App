<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="stylesheet" href="job.css">
</head>

<body class="welcome-body">
    <header class="welcome-header">
        <div class="welcome-page">

            <div class="welcome-logo">
                <h3 class="welcome-logo1">Job</h3>
                <h3 class="welcome-logo2">Tracker</h3>
            </div>

            <div class="welcome-tab">
                <a href="#">Dashboard</a>
                <a href="application.html">Applications</a>
                <a href="analytics.html">Analytics</a>
                <a href="#">Logout</a>
            </div>
        </div>
    </header>

    <!-- Welcome Message -->

    <div class="welcome-message">
        <h2>Welcome, Damilare </h2>
        <img src="hello.png" alt="Hello">
    </div>

    <div class="welcome-info">
        <div class="total-application">
            <h3>Total Applications</h3>
            <p>18</p>
        </div>

        <div class="interviews">
            <h3>Interviews</h3>
            <p>5</p>
        </div>

        <div class="offers-rejected">
            <div class="offers">
                <h3>Offers</h3>
                <p>8</p>
            </div>
            <div class="divider"></div>
            <div class="rejected">
                <h3>Rejected</h3>
                <p>2</p>
            </div>

        </div>
    </div>
    <div class="recent-application-title">
        <div class="recent-application">
            <h3>Recent Applications</h3>
            <button>Add Job</button>
        </div>
    </div>

    <section>
        <table>
            <thead>
                <tr>
                    <th>Company</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Job application rows will be added here -->
            </tbody>
        </table>
    </section>

</body>

</html>
