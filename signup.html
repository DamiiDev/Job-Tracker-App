<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="job.css">
</head>

<body class="body">
    <div class="signup-container">

        <div class="form">

            <div class="header">
                <div class="create-account-logo">
                    <h3 class="create-account">Create Account</h3>
                </div>
            </div>

            <form id="signupForm" action="#" method="post">
                <div class="full-name">
                    <label for="fullName">Full Name</label>
                    <input id="signupFullName" type="text" name="fullName">
                </div>

                <div class="email">
                    <label for="Email">Email</label>
                    <input id="signupEmail" type="email" name="Email">
                </div>

                <div class="password">
                    <label for="password">Password</label>
                    <input id="signupPassword" type="password" name="password">
                </div>

                <div class="confirm-password">
                    <label for="confirm-password">Confirm Password</label>
                    <input id="signupConfirmPassword" type="password" name="confirm-password">
                </div>

                <button id="signupButton" type="submit" class="create-account-btn">Create Account</button>

                <p class="already-have-account">Already have an account? <a href="login.html">Login</a></p>
            </form>
        </div>
    </div>
</body>

</html>
